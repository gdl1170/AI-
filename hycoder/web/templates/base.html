<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI+</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --text-dim: #8b949e;
            --green: #3fb950;
            --blue: #58a6ff;
            --purple: #d2a8ff;
            --orange: #f0883e;
            --yellow: #ffd33d;
            --red: #f85149;
        }
        html, body { height: 100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
        }
        a { color: var(--blue); text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* ─── Sidebar ───────────────────────────────── */
        .sidebar {
            width: 240px;
            min-width: 240px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: sticky;
            top: 0;
        }
        .sidebar-header {
            padding: 20px 16px;
            border-bottom: 1px solid var(--border);
        }
        .sidebar-header h1 {
            font-size: 1.2rem;
            background: linear-gradient(135deg, var(--blue), var(--green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .sidebar-header .sub {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-top: 2px;
        }
        .sidebar-nav { flex: 1; padding: 8px; }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 6px;
            color: var(--text-dim);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.15s;
        }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
        .nav-item.active { background: rgba(88,166,255,0.1); color: var(--blue); }
        .nav-item .icon { font-size: 1.1rem; width: 20px; text-align: center; }

        .sidebar-footer {
            padding: 12px 16px;
            border-top: 1px solid var(--border);
            font-size: 0.75rem;
            color: var(--text-dim);
        }
        .status-dot {
            display: inline-block;
            width: 6px; height: 6px;
            border-radius: 50%;
            margin-right: 6px;
        }
        .status-dot.online { background: var(--green); }
        .status-dot.offline { background: var(--red); }

        /* ─── Main ─────────────────────────────────── */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }
        .main-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--surface);
        }
        .main-header h2 { font-size: 1.1rem; font-weight: 600; }
        .main-body { flex: 1; overflow-y: auto; padding: 24px; }

        /* ─── Cards ────────────────────────────────── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 16px;
        }
        .card h3 { font-size: 0.95rem; margin-bottom: 12px; }

        /* ─── Grid ─────────────────────────────────── */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
        .grid-4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
        @media (max-width: 700px) {
            .grid-2, .grid-3 { grid-template-columns: 1fr; }
        }

        /* ─── Buttons ──────────────────────────────── */
        .btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 8px 16px; border-radius: 6px;
            font-size: 0.85rem; font-weight: 500; cursor: pointer;
            border: 1px solid var(--border);
            background: #21262d; color: var(--text);
            transition: all 0.15s;
        }
        .btn:hover { background: #30363d; }
        .btn-primary { background: #238636; border-color: #2ea043; color: #fff; }
        .btn-primary:hover { background: #2ea043; }
        .btn-danger { background: transparent; border-color: var(--red); color: var(--red); }
        .btn-danger:hover { background: rgba(248,81,73,0.1); }
        .btn-sm { padding: 4px 10px; font-size: 0.8rem; }

        /* ─── Forms ────────────────────────────────── */
        input, textarea, select {
            width: 100%;
            padding: 10px 12px;
            background: #0d1117;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 0.9rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.15s;
        }
        input:focus, textarea:focus, select:focus { border-color: var(--blue); }
        textarea { resize: vertical; min-height: 80px; font-family: 'SF Mono', 'Fira Code', monospace; }
        label { display: block; font-size: 0.85rem; color: var(--text-dim); margin-bottom: 4px; }
        .form-group { margin-bottom: 16px; }

        /* ─── Stat value ───────────────────────────── */
        .stat-value { font-size: 1.8rem; font-weight: 700; }
        .stat-label { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

        /* ─── Modal ────────────────────────────────── */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.2s;
        }
        .modal-overlay.open { opacity: 1; pointer-events: all; }
        .modal {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; padding: 24px; width: 90%; max-width: 560px;
            max-height: 80vh; overflow-y: auto;
        }
        .modal h3 { margin-bottom: 16px; }

        /* ─── Table ────────────────────────────────── */
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); }
        th { color: var(--text-dim); font-weight: 500; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; }
        tr:hover td { background: rgba(255,255,255,0.02); }

        /* ─── Badges ───────────────────────────────── */
        .badge {
            display: inline-block; padding: 2px 8px; border-radius: 10px;
            font-size: 0.7rem; font-weight: 600;
        }
        .badge-green { background: rgba(63,185,80,0.15); color: var(--green); border: 1px solid var(--green); }
        .badge-blue { background: rgba(88,166,255,0.15); color: var(--blue); border: 1px solid var(--blue); }
        .badge-yellow { background: rgba(255,211,61,0.15); color: var(--yellow); border: 1px solid var(--yellow); }

        /* ─── Toast ────────────────────────────────── */
        .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 2000; display: flex; flex-direction: column; gap: 8px; }
        .toast {
            padding: 12px 20px; border-radius: 8px; font-size: 0.85rem;
            background: var(--surface); border: 1px solid var(--border);
            animation: slideIn 0.3s ease; max-width: 360px;
        }
        .toast.success { border-color: var(--green); }
        .toast.error { border-color: var(--red); }
        .toast.info { border-color: var(--blue); }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* ─── Misc ─────────────────────────────────── */
        .flex { display: flex; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .gap-2 { gap: 8px; }
        .gap-4 { gap: 16px; }
        .mt-2 { margin-top: 8px; }
        .mt-4 { margin-top: 16px; }
        .mb-4 { margin-bottom: 16px; }
        .text-dim { color: var(--text-dim); }
        .text-sm { font-size: 0.85rem; }
        .mono { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.85rem; }
        .hidden { display: none !important; }

        /* ─── Chat ─────────────────────────────────── */
        .chat-container {
            display: flex; flex-direction: column; height: 100%;
            max-width: 820px; margin: 0 auto; width: 100%;
        }
        .chat-messages {
            flex: 1; overflow-y: auto; padding: 16px 0;
            display: flex; flex-direction: column; gap: 12px;
        }
        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        .msg {
            padding: 12px 16px; border-radius: 8px; max-width: 85%;
            animation: fadeIn 0.25s ease; line-height: 1.5;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .msg.user {
            background: #1f6feb; color: #fff; align-self: flex-end;
        }
        .msg.local {
            background: #0d3a1e; border: 1px solid var(--green); align-self: flex-start;
        }
        .msg.online {
            background: #0c2d5e; border: 1px solid var(--blue); align-self: flex-start;
        }
        .msg .meta {
            font-size: 0.75rem; color: var(--text-dim); margin-top: 8px;
            display: flex; gap: 12px; flex-wrap: wrap;
        }
        .chat-input-area {
            padding: 16px 0; border-top: 1px solid var(--border);
            display: flex; gap: 8px;
        }
        .chat-input-area input { flex: 1; }
        .chat-bar {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 12px; background: var(--bg); border-radius: 6px;
            border: 1px solid var(--border); font-size: 0.8rem; margin-bottom: 8px;
        }
        .chat-bar .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .dot.local { background: var(--green); box-shadow: 0 0 6px var(--green); }
        .dot.online { background: var(--blue); box-shadow: 0 0 6px var(--blue); }
    </style>
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-header">
            <h1>AI+</h1>
            <div class="sub">AI ibrida locale + cloud</div>
        </div>
        <div class="sidebar-nav">
            <div class="nav-item" data-page="chat" onclick="navigate('chat')">
                <span class="icon">💬</span> <span data-i18n="nav.chat">Chat</span>
            </div>
            <div class="nav-item" data-page="dashboard" onclick="navigate('dashboard')">
                <span class="icon">📊</span> <span data-i18n="nav.dashboard">Dashboard</span>
            </div>
            <div class="nav-item" data-page="agents" onclick="navigate('agents')">
                <span class="icon">🤖</span> <span data-i18n="nav.agents">Agents</span>
            </div>
            <div class="nav-item" data-page="commands" onclick="navigate('commands')">
                <span class="icon">⚡</span> <span data-i18n="nav.commands">Commands</span>
            </div>
            <div class="nav-item" data-page="settings" onclick="navigate('settings')">
                <span class="icon">⚙</span> <span data-i18n="nav.settings">Settings</span>
            </div>
        </div>
        <div class="sidebar-footer">
            <div><span class="status-dot" id="ollamaStatus"></span> Ollama <span id="ollamaLabel" data-i18n="common.loading">verifica...</span></div>
            <div style="margin-top:4px"><span class="status-dot" id="onlineStatus"></span> <span data-i18n="settings.online">Online</span> <span id="onlineLabel" data-i18n="common.loading">verifica...</span></div>
        </div>
    </nav>

    <div class="main">
        <div class="main-header">
            <h2 id="pageTitle">Chat</h2>
            <div style="display:flex;gap:8px;align-items:center;font-size:0.8rem;color:var(--text-dim)">
                <span id="headerTokens">0 token</span>
                <span>·</span>
                <span id="headerTime">0s</span>
            </div>
        </div>
        <div class="main-body" id="mainBody">
            <div id="pageContent"></div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        // ─── Navigation ──────────────────────────────────────────
        let currentPage = 'chat';

        function navigate(page) {
            currentPage = page;
            document.querySelectorAll('.nav-item').forEach(el => {
                el.classList.toggle('active', el.dataset.page === page);
            });
            const titles = { chat: __('page.title.chat'), dashboard: __('page.title.dashboard'), agents: __('page.title.agents'), commands: __('page.title.commands'), settings: __('page.title.settings') };
            document.getElementById('pageTitle').textContent = titles[page] || page;
            loadPage(page);
        }

        function loadPage(page) {
            const el = document.getElementById('pageContent');
            el.innerHTML = '<div class="text-dim" style="text-align:center;padding:40px">' + __('common.loading') + '</div>';
            const pages = {
                chat: renderChat,
                dashboard: renderDashboard,
                agents: renderAgents,
                commands: renderCommands,
                settings: renderSettings,
            };
            if (pages[page]) pages[page]();
        }

        // ─── Toast ──────────────────────────────────────────────
        function toast(msg, type = 'info') {
            const c = document.getElementById('toastContainer');
            const t = document.createElement('div');
            t.className = 'toast ' + type;
            t.textContent = msg;
            c.appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 3000);
        }

        // ─── API ────────────────────────────────────────────────
        async function api(url, opts = {}) {
            const res = await fetch(url, {
                headers: { 'Content-Type': 'application/json' },
                ...opts,
            });
            if (!res.ok) throw new Error((await res.json()).error || res.statusText);
            return res.json();
        }

        // ─── Status Bar ─────────────────────────────────────────
        async function updateStatus() {
            try {
                const info = await api('/api/system/info');
                document.getElementById('ollamaStatus').className = 'status-dot ' + (info.ollama_running ? 'online' : 'offline');
                document.getElementById('ollamaLabel').textContent = info.ollama_running ? info.local_model : __('common.loading');
                document.getElementById('onlineStatus').className = 'status-dot ' + (info.online_configured ? 'online' : 'offline');
                document.getElementById('onlineLabel').textContent = info.online_configured ? info.online_model : __('common.loading');
            } catch(e) {}
        }
        updateStatus();
        setInterval(updateStatus, 10000);

        // ─── Update header stats ────────────────────────────────
        async function updateHeaderStats() {
            try {
                const s = await api('/api/stats');
                document.getElementById('headerTokens').textContent = s.total.tokens_total.toLocaleString() + ' token';
                document.getElementById('headerTime').textContent = s.total.time_s.toFixed(1) + 's';
            } catch(e) {}
        }
        setInterval(updateHeaderStats, 3000);

        // ─── Init ───────────────────────────────────────────────
        navigate('chat');
    </script>
</body>
</html>
